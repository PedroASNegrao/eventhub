version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: eventhub_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: eventhub_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - eventhub-network

volumes:
  postgres_data:

networks:
  eventhub-network:
    driver: bridge