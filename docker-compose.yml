services:
  db:
    image: postgres:15-alpine
    container_name: eventhub_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: eventhub_db
    ports:
      - "5433:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d eventhub_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - eventhub-network

  app:
    build:
      context: ./backend
    container_name: eventhub_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/eventhub_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
    ports:
      - "8080:8080"
    networks:
      - eventhub-network

networks:
  eventhub-network:
    driver: bridge
